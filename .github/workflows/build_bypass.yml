name: Build Dylib + Patch TIPA

on:
  push:
    branches: [main]
    paths:
      - 'tweak/**'
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL tải IPA/TIPA gốc của XXTExplorer (bắt buộc để tạo TIPA patched)'
        required: true
        type: string

jobs:
  # ══════════════════════════════════════════
  # JOB 1: Build dylib
  # ══════════════════════════════════════════
  build-dylib:
    runs-on: macos-14
    outputs:
      dylib_ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Download iOS SDKs
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/theos-sdks
          mkdir -p $THEOS/sdks
          find /tmp/theos-sdks -maxdepth 1 -name "*.sdk" -exec cp -r {} $THEOS/sdks/ \;

      - name: Install ldid
        run: brew install ldid

      - name: Build Dylib
        working-directory: tweak
        run: make -j$(sysctl -n hw.ncpu) THEOS=$THEOS STRIP=0 DEBUG=0 2>&1

      - name: Collect Dylib
        id: check
        run: |
          mkdir -p dist
          DYLIB=$(find tweak -name "*.dylib" | grep -v unsigned | head -1)
          echo "Found: $DYLIB"
          cp "$DYLIB" dist/XXTExplorerAuthBypass.dylib
          echo "ready=true" >> $GITHUB_OUTPUT

      - name: Upload Dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-bypass-dylib
          path: dist/XXTExplorerAuthBypass.dylib
          retention-days: 7

  # ══════════════════════════════════════════
  # JOB 2: Inject dylib vào IPA → xuất TIPA
  # ══════════════════════════════════════════
  patch-tipa:
    runs-on: macos-14
    needs: build-dylib

    steps:
      - name: Download Dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-bypass-dylib
          path: dist/

      - name: Download Original IPA
        run: |
          echo "Downloading IPA from: ${{ inputs.ipa_url }}"
          curl -fL -o dist/original.ipa "${{ inputs.ipa_url }}"
          echo "IPA size: $(du -sh dist/original.ipa)"

      - name: Install Azule
        run: |
          git clone --depth 1 https://github.com/Al4ise/Azule /tmp/azule
          sudo ln -sf /tmp/azule/azule /usr/local/bin/azule
          chmod +x /tmp/azule/azule

      - name: Patch IPA
        run: |
          ls -la dist/
          mkdir -p output
          azule \
            -i dist/original.ipa \
            -f dist/XXTExplorerAuthBypass.dylib \
            -o output
          echo "Output files:"
          ls -la output/
          # Tìm file IPA được tạo ra và đổi sang .tipa
          PATCHED=$(find output -name "*.ipa" | head -1)
          echo "Patched IPA: $PATCHED"
          cp "$PATCHED" dist/XXTExplorer_Bypass.tipa
          echo "Patched TIPA size: $(du -sh dist/XXTExplorer_Bypass.tipa)"

      - name: Upload Patched TIPA
        uses: actions/upload-artifact@v4
        with:
          name: XXTExplorer-Bypass-TIPA
          path: |
            dist/XXTExplorer_Bypass.tipa
            dist/XXTExplorer_Bypass.ipa
          retention-days: 30
