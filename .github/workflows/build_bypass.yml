name: Build Dylib + Patch TIPA

on:
  push:
    branches: [main]
    paths:
      - 'tweak/**'
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL tải IPA/TIPA gốc của XXTExplorer (bắt buộc)'
        required: true
        type: string

jobs:
  build-dylib:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Download iOS SDKs
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/theos-sdks
          mkdir -p $THEOS/sdks
          find /tmp/theos-sdks -maxdepth 1 -name "*.sdk" -exec cp -r {} $THEOS/sdks/ \;

      - name: Install ldid
        run: brew install ldid

      - name: Build Dylib
        working-directory: tweak
        run: make -j$(sysctl -n hw.ncpu) THEOS=$THEOS STRIP=0 DEBUG=0 2>&1

      - name: Collect Dylib
        run: |
          mkdir -p dist
          DYLIB=$(find tweak -name "*.dylib" | grep -v unsigned | head -1)
          cp "$DYLIB" dist/XXTExplorerAuthBypass.dylib

      - name: Upload Dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-bypass-dylib
          path: dist/XXTExplorerAuthBypass.dylib
          retention-days: 7

  patch-tipa:
    runs-on: macos-14
    needs: build-dylib
    steps:
      - name: Download Dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-bypass-dylib
          path: dist/

      - name: Download Original IPA
        run: |
          curl -fL -o dist/original.ipa "${{ inputs.ipa_url }}"

      - name: Install Azule
        run: |
          git clone --depth 1 https://github.com/Al4ise/Azule /tmp/azule
          sudo ln -sf /tmp/azule/azule /usr/local/bin/azule
          chmod +x /tmp/azule/azule

      - name: Patch IPA
        run: |
          mkdir -p output
          azule \
            -i "$GITHUB_WORKSPACE/dist/original.ipa" \
            -f "$GITHUB_WORKSPACE/dist/XXTExplorerAuthBypass.dylib" \
            -o output \
            -s
          PATCHED=$(find output -name "*.ipa" | head -1)
          cp "$PATCHED" dist/XXTExplorer_Bypass.tipa

      - name: Deep Inject into Daemons
        run: |
          # Tải insert_dylib bản biên dịch sẵn thay vì xcodebuild để không bị treo
          curl -fL -o /tmp/insert_dylib "https://github.com/Tyilo/insert_dylib/releases/download/v0.1.4/insert_dylib"
          chmod +x /tmp/insert_dylib
          sudo mv /tmp/insert_dylib /usr/local/bin/
          
          # Giải nén TIPA đã được Azule patch
          mkdir -p /tmp/deep_patch
          cd /tmp/deep_patch
          unzip -q "$GITHUB_WORKSPACE/dist/XXTExplorer_Bypass.tipa"
          
          # Tìm vị trí chính xác của dylib do Azule chèn vào
          APP_DIR=$(find Payload -name "*.app" -type d | head -1)
          DYLIB_PATH=$(find "$APP_DIR" -name "XXTExplorerAuthBypass.dylib" | head -1)
          
          if [ -n "$DYLIB_PATH" ]; then
            echo "Found dylib at: $DYLIB_PATH"
            # Thêm inject vào ngserviced, lua, luac
            BIN_DIR="$APP_DIR/.jbroot-ABCDEF1234567890/usr/local/xxtouch/bin"
            
            # Tính toán đường dẫn tương đối từ bin/ đến thư mục chứa dylib (thường là góc .app hoặc Frameworks)
            for BIN_FILE in "$BIN_DIR"/*; do
              if [ -f "$BIN_FILE" ]; then
                echo "Injecting into $BIN_FILE..."
                # Đường dẫn để dyld tìm thấy file dylib bảo vệ của chúng ta (5 lớp lùi về .app root)
                insert_dylib --all-yes --inplace "@executable_path/../../../../../XXTExplorerAuthBypass.dylib" "$BIN_FILE" || true
              fi
            done
            
            # Đóng gói TIPA siêu cấp
            rm -f "$GITHUB_WORKSPACE/dist/XXTExplorer_Bypass.tipa"
            zip -qr "$GITHUB_WORKSPACE/dist/XXTExplorer_Bypass_Ultimate.tipa" Payload/
          else
            echo "ERROR: Azule did not inject dylib correctly!"
            exit 1
          fi

      - name: Upload Patched TIPA
        uses: actions/upload-artifact@v4
        with:
          name: XXTExplorer-Bypass-TIPA
          path: |
            dist/XXTExplorer_Bypass_Ultimate.tipa
          retention-days: 30
