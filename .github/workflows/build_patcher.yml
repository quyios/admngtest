name: Build XXTEPatcher TIPA

on:
  push:
    branches: [main]
    paths:
      - 'patcher/**'
  workflow_dispatch:

jobs:
  build-patcher:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Setup Theos ───
      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      # ─── Download iOS SDKs (clone repo, lấy tất cả SDK) ───
      - name: Download iOS SDKs
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/theos-sdks
          mkdir -p $THEOS/sdks
          find /tmp/theos-sdks -maxdepth 1 -name "*.sdk" -exec cp -r {} $THEOS/sdks/ \;
          echo "Available SDKs:"
          ls $THEOS/sdks/

      # ─── Build patcher app ───
      - name: Build Patcher App
        working-directory: patcher
        run: |
          make -j$(nproc) \
            THEOS=$THEOS \
            STRIP=0 \
            DEBUG=0 \
            2>&1

      # ─── Đóng gói .app thành .tipa ───
      - name: Package as TIPA
        run: |
          mkdir -p dist
          
          # Tìm .app bundle từ build output
          APP_BUNDLE=$(find patcher -name "XXTEPatcher.app" -type d | head -1)
          echo "Found app bundle: $APP_BUNDLE"
          
          if [ -n "$APP_BUNDLE" ]; then
            mkdir -p /tmp/Payload
            cp -r "$APP_BUNDLE" /tmp/Payload/
            cd /tmp
            zip -r - Payload/ > $GITHUB_WORKSPACE/dist/XXTEPatcher.ipa
            cp $GITHUB_WORKSPACE/dist/XXTEPatcher.ipa $GITHUB_WORKSPACE/dist/XXTEPatcher.tipa
            echo "Packaged: $(du -sh $GITHUB_WORKSPACE/dist/XXTEPatcher.tipa)"
          else
            echo "ERROR: Cannot find .app bundle"
            find patcher -type d | head -30
            exit 1
          fi

      # ─── Upload TIPA ───
      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: XXTEPatcher-TIPA
          path: |
            dist/XXTEPatcher.tipa
            dist/XXTEPatcher.ipa
          retention-days: 30
