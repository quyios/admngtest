name: Build XXTEPatcher TIPA

on:
  push:
    branches: [main]
    paths:
      - 'patcher/**'
  workflow_dispatch:

jobs:
  build-patcher:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Setup Theos ───
      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      # ─── Download iOS SDKs (clone repo, lấy tất cả SDK) ───
      - name: Download iOS SDKs
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/theos-sdks
          mkdir -p $THEOS/sdks
          find /tmp/theos-sdks -maxdepth 1 -name "*.sdk" -exec cp -r {} $THEOS/sdks/ \;
          echo "Available SDKs:"
          ls $THEOS/sdks/

      # ─── Install ldid ───
      - name: Install ldid
        run: brew install ldid

      # ─── Build patcher app ───
      - name: Build Patcher App
        working-directory: patcher
        run: |
          make -j$(sysctl -n hw.ncpu) \
            THEOS=$THEOS \
            STRIP=0 \
            DEBUG=0 \
            2>&1

      # ─── Đóng gói .app thành .tipa ───
      - name: Package as TIPA
        run: |
          mkdir -p dist
          
          # Tìm .app bundle vừa build
          APP_BUNDLE=$(find patcher/.theos -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            APP_BUNDLE=$(find patcher -name "*.app" -type d | head -1)
          fi
          
          echo "Found app bundle: $APP_BUNDLE"
          
          if [ -n "$APP_BUNDLE" ]; then
            # Tạo thư mục Payload tạm thời
            mkdir -p /tmp/Payload
            cp -r "$APP_BUNDLE" /tmp/Payload/
            
            # Đảm bảo Info.plist nằm đúng chỗ (iOS yêu cầu inside .app)
            BUNDLE_NAME=$(basename "$APP_BUNDLE")
            TARGET_APP="/tmp/Payload/$BUNDLE_NAME"
            
            cp patcher/Info.plist "$TARGET_APP/"
            # Entitlements thường được nhúng vào binary nhưng TrollStore thích có file ngoài để test
            cp patcher/Entitlements.plist "$TARGET_APP/"
            
            echo "Contents of $BUNDLE_NAME:"
            ls -la "$TARGET_APP/"
            
            # Kiểm tra xem có Info.plist chưa
            if [ ! -f "$TARGET_APP/Info.plist" ]; then
              echo "ERROR: Info.plist still missing!"
              exit 1
            fi
            
            # Đóng gói zip
            cd /tmp
            zip -r XXTEPatcher.ipa Payload/
            cp XXTEPatcher.ipa $GITHUB_WORKSPACE/dist/XXTEPatcher.tipa
            cp XXTEPatcher.ipa $GITHUB_WORKSPACE/dist/XXTEPatcher.ipa
            
            echo "Packaged TIPA: $(ls -lh $GITHUB_WORKSPACE/dist/XXTEPatcher.tipa)"
          else
            echo "ERROR: Cannot find .app bundle"
            exit 1
          fi

      # ─── Upload TIPA ───
      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: XXTEPatcher-TIPA
          path: |
            dist/XXTEPatcher.tipa
            dist/XXTEPatcher.ipa
          retention-days: 30
